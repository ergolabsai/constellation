<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Constellation</title>
<style>
  :root {
    --bg: #fafafa;
    --panel-bg: #ffffff;
    --border: #e3e3e3;
    --text: #1f2937;
    --text-dim: #6b7280;
    --accent: #2563eb;
    --pos: #22c55e;
    --neu: #f59e0b;
    --neg: #ef4444;
    --residual: #b91c1c;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--text);
    background: var(--bg);
    font-size: 13px;
    line-height: 1.4;
  }
  header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-bg);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    margin: 0;
  }
  .meta { color: var(--text-dim); font-size: 12px; }
  .meta b { color: var(--text); font-weight: 600; }
  .modes { display: flex; gap: 4px; margin-left: auto; }
  .modes button {
    padding: 4px 10px; border: 1px solid var(--border); background: white;
    cursor: pointer; font-size: 12px; border-radius: 4px;
  }
  .modes button.active { background: var(--accent); color: white; border-color: var(--accent); }
  main {
    display: grid;
    grid-template-columns: 1fr 360px;
    height: calc(100vh - 53px);
  }
  #graph-wrap { position: relative; overflow: hidden; }
  #graph { width: 100%; height: 100%; display: block; cursor: grab; }
  #graph:active { cursor: grabbing; }
  aside {
    border-left: 1px solid var(--border);
    background: var(--panel-bg);
    overflow-y: auto;
    padding: 14px 16px;
  }
  aside h2 { font-size: 14px; font-weight: 600; margin: 0 0 8px; }
  aside h3 { font-size: 12px; font-weight: 600; margin: 12px 0 4px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  aside .placeholder { color: var(--text-dim); font-style: italic; padding-top: 30px; text-align: center; }
  aside .pill {
    display: inline-block; padding: 1px 6px; border-radius: 999px;
    background: #f3f4f6; color: var(--text); font-size: 11px; margin-right: 4px;
  }
  aside .kv { display: flex; gap: 6px; margin: 2px 0; }
  aside .kv .k { color: var(--text-dim); flex: 0 0 auto; }
  aside .kv .v { color: var(--text); }
  aside .quote { border-left: 3px solid var(--border); padding: 4px 8px; margin: 6px 0; color: var(--text-dim); font-style: italic; }
  aside .step {
    background: #f9fafb; border-radius: 4px; padding: 6px 8px; margin: 4px 0;
    font-size: 12px;
  }
  aside .step .badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    margin-right: 4px; background: #e5e7eb;
  }
  aside .step .badge.high { background: #fee2e2; color: #991b1b; }
  aside .step .badge.medium { background: #fef3c7; color: #92400e; }
  aside .step .badge.low { background: #dcfce7; color: #166534; }
  aside button.filter {
    padding: 2px 8px; margin: 2px 4px 2px 0; font-size: 11px;
    border: 1px solid var(--border); background: white; border-radius: 999px;
    cursor: pointer;
  }
  aside button.filter.active { background: var(--accent); color: white; border-color: var(--accent); }
  aside ul { padding-left: 16px; margin: 4px 0; }
  aside li { margin: 2px 0; }
  aside .small { font-size: 11px; color: var(--text-dim); }
  .tooltip {
    position: absolute; background: rgba(17, 24, 39, 0.93); color: white;
    padding: 4px 8px; border-radius: 4px; font-size: 12px;
    pointer-events: none; max-width: 280px; opacity: 0; transition: opacity 0.1s;
  }
  /* graph element styles */
  .hull { fill-opacity: 0.18; stroke-width: 1.5; stroke-opacity: 0.8; }
  .hull.dim { fill-opacity: 0.05; stroke-opacity: 0.2; }
  .link { stroke-opacity: 0.55; cursor: pointer; }
  .link.dim { stroke-opacity: 0.1; }
  .node { stroke: white; stroke-width: 1.5; cursor: pointer; }
  .node.dim { opacity: 0.25; }
  .node.selected { stroke: black; stroke-width: 2.5; }
  .node-label { pointer-events: none; font-size: 9px; fill: var(--text-dim); text-anchor: middle; }
</style>
</head>
<body>
  <header>
    <h1 id="title"></h1>
    <div class="meta" id="meta"></div>
    <div class="modes">
      <button data-mode="structural" class="active">Structural map</button>
      <button data-mode="priority">Research priorities</button>
    </div>
  </header>
  <main>
    <div id="graph-wrap">
      <svg id="graph"></svg>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <aside id="panel">
      <div class="placeholder">Click a node, edge, or Idea hull to see details.</div>
    </aside>
  </main>

  <script type="application/json" id="data">__PAYLOAD_JSON__</script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
  // ===== DATA =====
  const DATA = JSON.parse(document.getElementById('data').textContent);
  let mode = 'structural';
  let selectedNode = null;

  // Header
  document.getElementById('title').textContent = `Constellation: ${DATA.corpus}`;
  const s = DATA.stats;
  document.getElementById('meta').innerHTML =
    `<b>${s.n_papers}</b> papers · <b>${s.n_claims}</b> claims · ` +
    `<b>${s.n_edges}</b> edges · <b>${s.n_ideas}</b> ideas · ` +
    `coh <b>${s.coherence.toFixed(2)}</b> · ρ <b>${s.rho.toFixed(3)}</b> · ` +
    `<b>${s.n_residual_h1}</b> residual H¹ · <b>${s.n_rewrites}</b> rewrites`;

  // ===== Color scales =====
  const paperColor = d3.scaleOrdinal()
    .domain(DATA.papers.map(p => p.paper_id))
    .range(d3.schemeTableau10);

  const ideaColor = d3.scaleOrdinal()
    .domain(DATA.ideas.map(i => i.idea_id))
    .range(d3.schemeSet3);

  const rhoColor = d3.scaleSequential(d3.interpolateYlOrRd).domain([0, 0.5]);

  function edgeColor(e) {
    if (e.is_residual) return 'var(--residual)';
    if (e.selected_score >= 0.4) return 'var(--pos)';
    if (e.selected_score >= 0) return 'var(--neu)';
    return 'var(--neg)';
  }

  function edgeWidth(e) {
    return 1 + 2 * Math.abs(e.selected_score);
  }

  // ===== Layout =====
  const svg = d3.select('#graph');
  const wrap = document.getElementById('graph-wrap');
  function size() { return [wrap.clientWidth, wrap.clientHeight]; }

  // Zoom/pan
  const zoom = d3.zoom().scaleExtent([0.2, 4]).on('zoom', (event) => {
    root.attr('transform', event.transform);
  });
  svg.call(zoom);

  const root = svg.append('g');
  const hullsG = root.append('g').attr('class', 'hulls');
  const linksG = root.append('g').attr('class', 'links');
  const nodesG = root.append('g').attr('class', 'nodes');
  const labelsG = root.append('g').attr('class', 'labels');

  // Index claims by id, attach idea reference
  const ideaById = new Map(DATA.ideas.map(i => [i.idea_id, i]));
  const claimMap = new Map();
  DATA.claims.forEach(c => {
    c.idea = ideaById.get(c.idea_id);
    claimMap.set(c.claim_id, c);
  });
  // Resolve link source/target objects
  const links = DATA.edges.map(e => ({
    ...e,
    source: claimMap.get(e.source),
    target: claimMap.get(e.target),
  })).filter(l => l.source && l.target);

  // ===== Force simulation =====
  let [w, h] = size();
  const sim = d3.forceSimulation(DATA.claims)
    .force('link', d3.forceLink(links).id(d => d.claim_id)
      .distance(d => 60 + 60 * (1 - Math.max(0, d.selected_score)))
      .strength(d => 0.3 + 0.4 * Math.max(0, d.selected_score)))
    .force('charge', d3.forceManyBody().strength(-180))
    .force('center', d3.forceCenter(w / 2, h / 2))
    .force('collide', d3.forceCollide().radius(d => 6 + 6 * d.credibility))
    .force('idea', ideaCohesion(0.05));

  // Light intra-Idea attraction so hulls form coherent clumps.
  function ideaCohesion(strength) {
    let nodes;
    function force(alpha) {
      const groups = new Map();
      nodes.forEach(n => {
        if (!n.idea_id) return;
        if (!groups.has(n.idea_id)) groups.set(n.idea_id, []);
        groups.get(n.idea_id).push(n);
      });
      groups.forEach(group => {
        const cx = d3.mean(group, n => n.x);
        const cy = d3.mean(group, n => n.y);
        group.forEach(n => {
          n.vx += (cx - n.x) * strength * alpha;
          n.vy += (cy - n.y) * strength * alpha;
        });
      });
    }
    force.initialize = (n) => { nodes = n; };
    return force;
  }

  // ===== Render: links =====
  const link = linksG.selectAll('line')
    .data(links)
    .enter().append('line')
    .attr('class', 'link')
    .attr('stroke', edgeColor)
    .attr('stroke-width', edgeWidth)
    .on('click', (ev, d) => { ev.stopPropagation(); showEdge(d); })
    .on('mouseover', (ev, d) => showTip(ev, edgeTip(d)))
    .on('mousemove', moveTip)
    .on('mouseout', hideTip);

  // ===== Render: nodes =====
  const node = nodesG.selectAll('circle')
    .data(DATA.claims)
    .enter().append('circle')
    .attr('class', 'node')
    .attr('r', d => 5 + 7 * d.credibility)
    .attr('fill', d => paperColor(d.paper_id))
    .call(drag(sim))
    .on('click', (ev, d) => { ev.stopPropagation(); showClaim(d); })
    .on('mouseover', (ev, d) => showTip(ev, claimTip(d)))
    .on('mousemove', moveTip)
    .on('mouseout', hideTip);

  // ===== Render: labels (only abbreviated id) =====
  const label = labelsG.selectAll('text')
    .data(DATA.claims)
    .enter().append('text')
    .attr('class', 'node-label')
    .text(d => d.claim_id.split(':').pop());

  // ===== Hulls (one per Idea) =====
  function hullPath(points) {
    if (points.length < 3) {
      // Fallback: padded circle/line shape — just connect with extra padding
      const cx = d3.mean(points, p => p[0]);
      const cy = d3.mean(points, p => p[1]);
      const r = 30;
      return `M ${cx - r} ${cy} a ${r} ${r} 0 1 0 ${2 * r} 0 a ${r} ${r} 0 1 0 ${-2 * r} 0 Z`;
    }
    const padded = d3.polygonHull(points);
    if (!padded) return '';
    // Inflate the hull by ~15px outward from centroid
    const cx = d3.mean(padded, p => p[0]);
    const cy = d3.mean(padded, p => p[1]);
    const inflated = padded.map(([x, y]) => {
      const dx = x - cx, dy = y - cy;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      const k = (len + 18) / len;
      return [cx + dx * k, cy + dy * k];
    });
    return 'M' + inflated.map(p => p.join(',')).join('L') + 'Z';
  }

  const hulls = hullsG.selectAll('path')
    .data(DATA.ideas)
    .enter().append('path')
    .attr('class', 'hull')
    .attr('fill', d => structuralHullFill(d))
    .attr('stroke', d => structuralHullStroke(d))
    .on('click', (ev, d) => { ev.stopPropagation(); showIdea(d); })
    .on('mouseover', (ev, d) => showTip(ev, ideaTip(d)))
    .on('mousemove', moveTip)
    .on('mouseout', hideTip);

  function structuralHullFill(idea) { return ideaColor(idea.idea_id); }
  function structuralHullStroke(idea) { return ideaColor(idea.idea_id); }

  // ===== Tick =====
  sim.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('cx', d => d.x).attr('cy', d => d.y);
    label.attr('x', d => d.x).attr('y', d => d.y - (5 + 7 * d.credibility) - 2);
    hulls.attr('d', d => {
      const pts = d.claim_ids.map(id => claimMap.get(id))
        .filter(c => c && c.x != null).map(c => [c.x, c.y]);
      return hullPath(pts);
    });
  });

  function drag(simulation) {
    return d3.drag()
      .on('start', (ev, d) => {
        if (!ev.active) simulation.alphaTarget(0.25).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on('end', (ev, d) => {
        if (!ev.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      });
  }

  // ===== Tooltip =====
  const tip = document.getElementById('tooltip');
  function showTip(ev, html) { tip.innerHTML = html; tip.style.opacity = 1; moveTip(ev); }
  function moveTip(ev) {
    const r = wrap.getBoundingClientRect();
    tip.style.left = (ev.clientX - r.left + 12) + 'px';
    tip.style.top = (ev.clientY - r.top + 12) + 'px';
  }
  function hideTip() { tip.style.opacity = 0; }

  function claimTip(c) {
    const ideaLabel = c.idea ? c.idea.label : '(no idea)';
    return `<b>${escapeHtml(c.claim_id)}</b><br>` +
      `${escapeHtml(c.cause)} <em>${escapeHtml(c.direction || '')}</em> ${escapeHtml(c.effect)}<br>` +
      `<span class="small">${escapeHtml(ideaLabel.slice(0, 70))}${c.is_rewritten ? ' · rewritten' : ''}</span>`;
  }
  function edgeTip(e) {
    return `<b>${escapeHtml(e.kind)}</b> (${e.selected_score >= 0 ? '+' : ''}${e.selected_score.toFixed(2)})<br>` +
      `${escapeHtml(e.source.claim_id)} ↔ ${escapeHtml(e.target.claim_id)}` +
      (e.is_residual ? '<br><span class="small">residual H¹</span>' : '');
  }
  function ideaTip(i) {
    return `<b>${escapeHtml(i.label.slice(0, 100))}</b><br>` +
      `<span class="small">${i.claim_ids.length} claims · ρ ${i.rho.toFixed(2)} · ${i.n_open_questions} open Qs</span>`;
  }

  // ===== Side panel =====
  const panel = document.getElementById('panel');

  function showClaim(c) {
    selectedNode = c.claim_id;
    highlight();
    const idea = c.idea;
    panel.innerHTML = `
      <h2>${escapeHtml(c.claim_id)}</h2>
      <div class="kv"><span class="k">Paper:</span><span class="v">${escapeHtml(c.paper_id)}</span></div>
      <div class="kv"><span class="k">Direction:</span><span class="v">${escapeHtml(c.direction || '?')}</span></div>
      <div class="kv"><span class="k">Credibility:</span><span class="v">${c.credibility.toFixed(2)}</span></div>
      <div class="kv"><span class="k">Variant:</span><span class="v">${escapeHtml(c.selected_variant_id.split('#')[1] || 'original')}${c.is_rewritten ? ' <span class="pill">rewritten</span>' : ''}</span></div>
      ${c.in_residual_edge ? '<div class="pill" style="background:#fee2e2;color:#991b1b">on residual edge</div>' : ''}
      <h3>Cause</h3>
      <div>${escapeHtml(c.cause)}</div>
      <h3>Effect</h3>
      <div>${escapeHtml(c.effect)}</div>
      ${idea ? `<h3>Belongs to Idea</h3><div><b>${escapeHtml(idea.label)}</b></div>` : ''}
    `;
  }

  function showEdge(e) {
    selectedNode = null;
    highlight();
    panel.innerHTML = `
      <h2>${escapeHtml(e.source.claim_id)} ↔ ${escapeHtml(e.target.claim_id)}</h2>
      <div class="kv"><span class="k">Kind:</span><span class="v"><b>${escapeHtml(e.kind)}</b></span></div>
      <div class="kv"><span class="k">Score:</span><span class="v">${e.selected_score >= 0 ? '+' : ''}${e.selected_score.toFixed(3)}</span></div>
      ${e.is_residual ? '<div class="pill" style="background:#fee2e2;color:#991b1b">residual H¹</div>' : ''}
      <h3>Explanation</h3>
      <div class="quote">${escapeHtml(e.explanation)}</div>
    `;
  }

  function showIdea(i) {
    selectedNode = null;
    highlight();
    const scope = i.scope || {};
    const conds = (scope.conditions || []).map(c => `<li>${escapeHtml(c)}</li>`).join('');
    const claims = i.claim_ids.map(id => `<li><code>${escapeHtml(id)}</code> — ${escapeHtml((claimMap.get(id) || {}).cause || '').slice(0, 80)}</li>`).join('');
    const qs = i.open_questions.map(q => `
      <div class="step">
        <div><b>${escapeHtml(q.question)}</b> <span class="badge ${q.priority || 'medium'}">${q.priority || 'medium'}</span></div>
        ${(q.suggested_next_steps || []).map(s => `
          <div style="margin-top:4px"><span class="badge ${s.effort || 'medium'}">${escapeHtml(s.kind || '')} · ${escapeHtml(s.effort || '')}</span> ${escapeHtml(s.description)}</div>
        `).join('')}
      </div>
    `).join('');
    panel.innerHTML = `
      <h2>${escapeHtml(i.label)}</h2>
      <div>${escapeHtml(i.description)}</div>
      <h3>Scope</h3>
      <div class="kv"><span class="k">Generality:</span><span class="v">${escapeHtml(scope.generality || '?')}</span></div>
      <div class="kv"><span class="k">Framework:</span><span class="v">${escapeHtml(scope.framework || '?')}</span></div>
      ${conds ? `<ul>${conds}</ul>` : ''}
      <h3>Consensus</h3>
      <div class="kv"><span class="k">Claims:</span><span class="v">${i.claim_ids.length} (${i.n_papers} papers)</span></div>
      <div class="kv"><span class="k">Agreement:</span><span class="v">${i.agreement_score >= 0 ? '+' : ''}${i.agreement_score.toFixed(2)}</span></div>
      <div class="kv"><span class="k">ρ (frustration):</span><span class="v">${i.rho.toFixed(2)}</span></div>
      <h3>Contributing claims</h3>
      <ul>${claims}</ul>
      ${i.open_questions.length ? `<h3>Open questions (${i.open_questions.length})</h3>${qs}` : ''}
    `;
  }

  // Highlight neighbors of selected node
  function highlight() {
    if (!selectedNode) {
      node.classed('dim', false).classed('selected', false);
      link.classed('dim', false);
      hulls.classed('dim', false);
      return;
    }
    const neighbors = new Set([selectedNode]);
    links.forEach(l => {
      if (l.source.claim_id === selectedNode) neighbors.add(l.target.claim_id);
      if (l.target.claim_id === selectedNode) neighbors.add(l.source.claim_id);
    });
    node.classed('dim', d => !neighbors.has(d.claim_id))
      .classed('selected', d => d.claim_id === selectedNode);
    link.classed('dim', d => d.source.claim_id !== selectedNode && d.target.claim_id !== selectedNode);
  }

  svg.on('click', () => { selectedNode = null; highlight(); });

  // ===== Mode toggling =====
  document.querySelectorAll('.modes button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.modes button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      mode = btn.dataset.mode;
      applyMode();
    });
  });

  function applyMode() {
    if (mode === 'structural') {
      node.attr('fill', d => paperColor(d.paper_id));
      hulls.attr('fill', structuralHullFill).attr('stroke', structuralHullStroke);
      link.attr('stroke', edgeColor).style('stroke-opacity', null);
      showPriorityPanelDefault(false);
    } else {
      // priority mode
      node.attr('fill', d => d.in_residual_edge ? 'var(--residual)' : '#cbd5e1');
      hulls.attr('fill', d => rhoColor(d.rho)).attr('stroke', d => rhoColor(d.rho));
      link.attr('stroke', d => d.selected_score < 0 ? edgeColor(d) : '#d1d5db')
        .style('stroke-opacity', d => d.selected_score < 0 ? 0.7 : 0.2);
      showPriorityPanelDefault(true);
    }
  }

  // Aggregated next-steps panel for priority mode
  let priorityFilter = null;   // {kind?, priority?}

  function showPriorityPanelDefault(force) {
    if (!force && panel.innerHTML.includes('<h2>')) return;   // user has something open
    renderPriorityPanel();
  }

  function aggregatedSteps() {
    const rows = [];
    DATA.ideas.forEach(idea => {
      (idea.open_questions || []).forEach(q => {
        (q.suggested_next_steps || []).forEach(step => {
          rows.push({
            idea_label: idea.label,
            idea_id: idea.idea_id,
            question: q.question,
            priority: q.priority || 'medium',
            kind: step.kind || 'unknown',
            effort: step.effort || 'medium',
            maturity: step.maturity || 'immediate',
            description: step.description || '',
            expected_outcome: step.expected_outcome || '',
          });
        });
      });
    });
    const prioOrder = { high: 0, medium: 1, low: 2 };
    const effOrder = { low: 0, medium: 1, high: 2, programmatic: 3 };
    rows.sort((a, b) =>
      (prioOrder[a.priority] - prioOrder[b.priority]) ||
      (effOrder[a.effort] - effOrder[b.effort]));
    return rows;
  }

  function renderPriorityPanel() {
    let rows = aggregatedSteps();
    const allKinds = [...new Set(rows.map(r => r.kind))];
    if (priorityFilter && priorityFilter.kind) {
      rows = rows.filter(r => r.kind === priorityFilter.kind);
    }
    const filterButtons = ['all', ...allKinds].map(k => {
      const active = (k === 'all' && !priorityFilter?.kind) || priorityFilter?.kind === k;
      return `<button class="filter${active ? ' active' : ''}" data-kind="${escapeHtml(k)}">${escapeHtml(k)}</button>`;
    }).join('');
    const stepsHtml = rows.map(r => `
      <div class="step">
        <div>
          <span class="badge ${r.priority}">${escapeHtml(r.priority)}</span>
          <span class="badge ${r.effort}">${escapeHtml(r.effort)}</span>
          <span class="badge">${escapeHtml(r.kind)}</span>
        </div>
        <div style="margin-top:4px">${escapeHtml(r.description)}</div>
        <div class="small" style="margin-top:4px">From: ${escapeHtml(r.idea_label.slice(0, 80))}</div>
        ${r.expected_outcome ? `<div class="small">Expected: ${escapeHtml(r.expected_outcome)}</div>` : ''}
      </div>
    `).join('');
    panel.innerHTML = `
      <h2>Research priorities</h2>
      <p class="small">${rows.length} suggested next-steps across ${DATA.ideas.length} Ideas, sorted by priority then effort.</p>
      <div>${filterButtons}</div>
      <div>${stepsHtml}</div>
    `;
    panel.querySelectorAll('.filter').forEach(btn => {
      btn.addEventListener('click', () => {
        const kind = btn.dataset.kind;
        priorityFilter = (kind === 'all') ? null : { kind };
        renderPriorityPanel();
      });
    });
  }

  // ===== Resize =====
  window.addEventListener('resize', () => {
    [w, h] = size();
    sim.force('center', d3.forceCenter(w / 2, h / 2)).alpha(0.2).restart();
  });

  // ===== Util =====
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  </script>
</body>
</html>
